<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Escáner QR + Carga de Imagen PNG (jsQR)</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', sans-serif;
            text-align: center;
            background: #eef2f5;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-container {
            max-width: 520px;
            width: 100%;
            margin: auto;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 24px 20px 30px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
        }

        h2 {
            font-size: 1.7rem;
            font-weight: 600;
            margin: 0 0 8px 0;
            color: #1E3C72;
        }

        .sub {
            color: #5b6e8c;
            font-size: 0.85rem;
            margin-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
            display: inline-block;
            padding-bottom: 6px;
        }

        #reader {
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .status-panel {
            background: #f8fafc;
            border-radius: 28px;
            padding: 12px 16px;
            margin-top: 20px;
            margin-bottom: 18px;
        }

        #msg {
            font-weight: 600;
            color: #1e293b;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .loading-bar {
            width: 100%;
            height: 5px;
            background: #e2e8f0;
            margin-top: 14px;
            border-radius: 20px;
            overflow: hidden;
            display: none;
        }

        .loading-bar-inner {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #2563eb, #38bdf8);
            transition: width 0.25s ease-out;
            border-radius: 20px;
        }

        .upload-zone {
            margin-top: 22px;
            border-top: 1px dashed #cbd5e1;
            padding-top: 20px;
        }

        .file-label {
            background: #f1f5f9;
            border: 1.5px dashed #94a3b8;
            border-radius: 60px;
            padding: 10px 24px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #1e40af;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

            .file-label:hover {
                background: #e6edf5;
                border-color: #3b82f6;
                color: #0f2b6d;
                transform: scale(0.98);
            }

        input[type="file"] {
            display: none;
        }

        .info-badge {
            font-size: 0.7rem;
            background: #eef2ff;
            padding: 4px 12px;
            border-radius: 40px;
            color: #2563eb;
            margin-top: 12px;
            display: inline-block;
        }

        @media (max-width: 480px) {
            .card {
                padding: 18px 16px 24px;
            }

            #reader {
                min-height: 280px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="card">
            <h2>📷 Lector QR</h2>
            <div class="sub">Cámara en vivo o imagen PNG</div>
            <div id="reader"></div>
            <div class="status-panel">
                <div id="msg">
                    <span class="icon">🔍</span> Apunta la cámara al código QR
                </div>
                <div class="loading-bar" id="bar">
                    <div class="loading-bar-inner" id="progress"></div>
                </div>
            </div>
            <div class="upload-zone">
                <label for="qrFile" class="file-label">
                    📂 Subir imagen (PNG / JPG) con código QR
                </label>
                <input type="file" id="qrFile" accept="image/png, image/jpeg, image/jpg">
                <div class="info-badge">
                    ⚡ Redirección automática al detectar QR
                </div>
            </div>
        </div>
    </div>

    <script>
    // ---------- Variables globales ----------
    let cameraScannerInstance = null;
    let isProcessing = false;

    const msgElement = document.getElementById('msg');
    const loadingBar = document.getElementById('bar');
    const progressBarInner = document.getElementById('progress');
    const fileInput = document.getElementById('qrFile');

    // ---------- Funciones UI ----------
    function setMessage(text, isError = false, isSuccess = false) {
        msgElement.innerHTML = `<span class="icon">${isError ? '⚠️' : (isSuccess ? '✅' : '🔍')}</span> ${text}`;
        msgElement.style.color = isError ? '#b91c1c' : (isSuccess ? '#15803d' : '#1e293b');
    }

    function showProgressBar(percent = 0) {
        loadingBar.style.display = 'block';
        progressBarInner.style.width = Math.min(100, Math.max(0, percent)) + '%';
    }

    function hideProgressBar() {
        loadingBar.style.display = 'none';
        progressBarInner.style.width = '0%';
    }

    function redirectToUrl(url, delayMs = 700) {
        if (isProcessing) return;
        isProcessing = true;
        setMessage("✅ ¡QR detectado! Redirigiendo ahora...", false, true);
        showProgressBar(100);
        setTimeout(() => {
            window.location.href = url;
        }, delayMs);
    }

    // ---------- Escáner con cámara (Html5Qrcode) ----------
    async function stopCameraScanner() {
        if (cameraScannerInstance) {
            try {
                await cameraScannerInstance.clear();
            } catch(e) { console.warn(e); }
            cameraScannerInstance = null;
        }
    }

    async function startCameraScanner() {
        if (cameraScannerInstance || isProcessing) return;
        try {
            cameraScannerInstance = new Html5QrcodeScanner(
                "reader",
                { fps: 18, qrbox: { width: 260, height: 260 }, aspectRatio: 1.0 },
                false
            );
            cameraScannerInstance.render(onQrDetectedByCamera, () => {});
            setMessage("📷 Cámara activa. Enfoca un código QR", false);
        } catch(err) {
            setMessage("❌ Error al acceder a la cámara", true);
            cameraScannerInstance = null;
        }
    }

    function onQrDetectedByCamera(decodedText) {
        if (isProcessing || !decodedText) return;
        console.log("QR cámara:", decodedText);
        if (cameraScannerInstance) {
            cameraScannerInstance.clear().catch(e=>console.warn);
            cameraScannerInstance = null;
        }
        setMessage(`🎯 QR leído: ${decodedText.substring(0, 40)}`, false, false);
        showProgressBar(70);
        redirectToUrl(decodedText, 750);
    }

    // ---------- LECTURA DE QR DESDE IMAGEN CON jsQR (más fiable) ----------
    async function decodeQrFromImageWithJsQR(file) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            const url = URL.createObjectURL(file);
            img.onload = () => {
                URL.revokeObjectURL(url);
                // Crear canvas y redimensionar si es necesario (max 1000px)
                let width = img.width;
                let height = img.height;
                const maxSize = 1000;
                if (width > maxSize || height > maxSize) {
                    if (width > height) {
                        height = (height * maxSize) / width;
                        width = maxSize;
                    } else {
                        width = (width * maxSize) / height;
                        height = maxSize;
                    }
                }
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                // Obtener datos de píxeles
                const imageData = ctx.getImageData(0, 0, width, height);
                // Usar jsQR para detectar código
                const code = jsQR(imageData.data, width, height, { inversionAttempts: "attemptBoth" });
                if (code && code.data) {
                    resolve(code.data);
                } else {
                    reject(new Error("No se encontró ningún código QR en la imagen"));
                }
            };
            img.onerror = () => {
                URL.revokeObjectURL(url);
                reject(new Error("No se pudo cargar la imagen"));
            };
            img.src = url;
        });
    }

    async function handleUploadedFile(file) {
        if (!file || isProcessing) return;
        if (!file.type.includes('image')) {
            setMessage("❌ El archivo no es una imagen válida", true);
            return;
        }
        await stopCameraScanner();
        setMessage(`📂 Procesando imagen...`, false);
        showProgressBar(30);

        try {
            const qrUrl = await decodeQrFromImageWithJsQR(file);
            if (!qrUrl || qrUrl.trim() === "") throw new Error("QR vacío");
            showProgressBar(100);
            setMessage(`✅ QR detectado. Redirigiendo...`, false, true);
            setTimeout(() => { window.location.href = qrUrl; }, 600);
        } catch (error) {
            console.error("jsQR error:", error);
            setMessage(`⚠️ ${error.message || "No se pudo leer el QR. Asegúrate de que la imagen contenga un código QR claro."}`, true);
            hideProgressBar();
            setTimeout(() => {
                if (!isProcessing) {
                    setMessage("📷 Cámara reiniciada. Escanea o sube otra imagen.", false);
                    startCameraScanner();
                }
            }, 2500);
        } finally {
            fileInput.value = '';
            if (!isProcessing) setTimeout(() => hideProgressBar(), 1500);
        }
    }

    // ---------- Eventos ----------
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file && !isProcessing) handleUploadedFile(file);
        else if (isProcessing) setMessage("⏳ Redirigiendo, espera...", false);
    });

    window.addEventListener('DOMContentLoaded', startCameraScanner);
    document.addEventListener('visibilitychange', () => {
        if (!document.hidden && !cameraScannerInstance && !isProcessing) startCameraScanner();
    });
    window.addEventListener('beforeunload', () => {
        if (cameraScannerInstance) cameraScannerInstance.clear().catch(e=>{});
    });
    </script>
</body>
</html>
